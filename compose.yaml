services:
  # API: editable install + test tools, source mounted, autoreload. No app-level auth — bound to
  # localhost only; see README.
  api:
    build:
      context: .
      target: dev
    # --timeout-graceful-shutdown caps how long uvicorn waits on in-flight requests (a live tail
    # or an open download stream) before force-closing them, so Ctrl+C / `make down` stops fast.
    command: uvicorn lawless_waf.main:app --host 0.0.0.0 --port 8000 --reload --timeout-graceful-shutdown 3
    # tini as PID 1: forwards SIGTERM to uvicorn and reaps the `az` child processes a download spawns.
    init: true
    # Don't sit at Docker's default 10s grace before SIGKILL — in-flight work is already drained.
    stop_grace_period: 5s
    # Bound to localhost only — this tool runs on the operator's laptop, not exposed to the LAN.
    # The "127.0.0.1:" prefix is the only thing keeping it off the LAN: uvicorn binds 0.0.0.0
    # inside the container, and there is no auth. Don't drop the prefix.
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      DATA_DIR: /data
    volumes:
      - .:/app
      - waf-data:/data
      # Reuse the operator's ambient `az login` session. Must be read-write: the Azure CLI
      # writes here (token refresh, command-index cache) and fails on a read-only mount.
      - ${HOME}/.azure:/root/.azure

  # Web UI: Vite with hot reload, proxying /api to the API (one origin -> enter key once).
  ui:
    image: node:20-slim
    working_dir: /fe
    # `exec` so Vite (not the wrapping sh) becomes the process that receives SIGTERM; init + a short
    # grace make Ctrl+C / `make down` stop the UI promptly instead of waiting on Docker's SIGKILL.
    command: sh -c "npm install && exec npm run dev -- --host"
    init: true
    stop_grace_period: 5s
    environment:
      VITE_API_PROXY: http://api:8000
    # As above: Vite binds 0.0.0.0 in the container, so this prefix is what keeps the UI off the LAN.
    ports:
      - "127.0.0.1:5173:5173"
    volumes:
      - ./frontend:/fe
      - /fe/node_modules
    depends_on:
      - api

volumes:
  waf-data:
